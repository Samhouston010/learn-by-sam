<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تنظیم زمان‌بندی درس ۴</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;800&family=Lora:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Vazirmatn',sans-serif;background:#f0f4f2;padding:20px;color:#1d2733}
h1{font-size:22px;font-weight:800;color:#0f5e57;margin-bottom:6px;text-align:center}
.sub{font-size:13px;color:#42535f;text-align:center;margin-bottom:20px}
.player-wrap{background:#fff;border-radius:14px;padding:14px 18px;margin-bottom:16px;box-shadow:0 4px 14px -8px rgba(0,0,0,.2);position:sticky;top:0;z-index:100}
.pb-row{display:flex;align-items:center;gap:10px}
.pb-btn{cursor:pointer;border:none;background:#0f5e57;color:#fff;border-radius:9px;height:42px;min-width:44px;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:4px;font-family:'Inter',sans-serif}
.pb-btn.sec{background:#e2eae7;color:#0f5e57;font-size:12px;min-width:38px;height:36px}
.pb-bar-wrap{flex:1;cursor:pointer}
.pb-bar{height:8px;background:#e7e2d6;border-radius:4px;position:relative;overflow:hidden}
.pb-fill{height:100%;background:linear-gradient(90deg,#0a9688,#00bcd4);border-radius:4px;width:0%}
.pb-time{font-family:'Inter',sans-serif;font-size:13px;color:#42535f;direction:ltr;min-width:90px;text-align:center}
audio{display:none}
.pairs{display:flex;flex-direction:column;gap:10px}
.pair-row{
  background:#fff;border:2px solid #e7e2d6;border-radius:12px;
  padding:14px 16px;display:flex;align-items:center;gap:12px;
  transition:border-color .15s,background .15s;
}
.pair-row.active{border-color:#0f5e57;background:#e7f1ee}
.pair-row.set{border-color:#b8860b;background:#fbf3e0}
.pair-num{font-family:'Inter',sans-serif;font-weight:800;font-size:13px;color:#fff;background:#13384f;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pair-text{flex:1;font-family:'Lora',serif;direction:ltr;text-align:left;font-size:14px;color:#13384f;line-height:1.6}
.pair-time{font-family:'Inter',sans-serif;font-size:13px;font-weight:700;color:#0f5e57;min-width:50px;text-align:center;direction:ltr}
.pair-time.set{color:#b8860b}
.set-btn{
  cursor:pointer;border:none;background:#0f5e57;color:#fff;
  border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;
  font-family:'Vazirmatn',sans-serif;white-space:nowrap;flex-shrink:0;
  transition:background .15s;
}
.set-btn:hover{background:#0c4f49}
.set-btn.done{background:#b8860b}
.result-wrap{background:#fff;border-radius:14px;padding:16px 18px;margin-top:16px;box-shadow:0 4px 14px -8px rgba(0,0,0,.2)}
.result-wrap h2{font-size:16px;font-weight:700;color:#0f5e57;margin-bottom:10px}
.result-code{
  direction:ltr;text-align:left;font-family:'Inter',sans-serif;font-size:13px;
  background:#f0f4f2;border-radius:8px;padding:12px;
  word-break:break-all;line-height:1.8;color:#1d2733;
  border:1px solid #e7e2d6;
}
.copy-btn{
  margin-top:10px;cursor:pointer;border:none;background:#0f5e57;color:#fff;
  border-radius:8px;padding:9px 20px;font-size:14px;font-weight:700;
  font-family:'Vazirmatn',sans-serif;
}
.copy-btn:hover{background:#0c4f49}
.hint{font-size:12px;color:#8a98a0;margin-top:6px}
</style>
</head>
<body>

<h1>🎯 ابزار تنظیم زمان‌بندی — درس ۴</h1>
<p class="sub">فایل صوتی را پخش کن، هر وقت به شروع یک جمله رسیدی دکمهٔ «ثبت» آن جمله را بزن</p>

<div class="player-wrap">
  <audio id="player" src="audio.mp3" preload="auto"></audio>
  <div class="pb-row">
    <button class="pb-btn" id="pbPlay">▶</button>
    <button class="pb-btn sec" id="pbBack">⏪5</button>
    <button class="pb-btn sec" id="pbFwd">⏩10</button>
    <div class="pb-bar-wrap" id="pbBarWrap">
      <div class="pb-bar"><div class="pb-fill" id="pbFill"></div></div>
    </div>
    <span class="pb-time"><span id="pbCur">0:00</span> / <span id="pbDur">0:00</span></span>
  </div>
</div>

<div class="pairs" id="pairsWrap">
</div>

<div class="result-wrap">
  <h2>📋 کد زمان‌بندی (برای کپی در درس ۴)</h2>
  <div class="result-code" id="resultCode">هنوز زمانی ثبت نشده...</div>
  <button class="copy-btn" id="copyBtn">کپی کردن</button>
  <p class="hint">این عبارت را در فایل index.html درس ۴ جایگزین TIMES قدیمی کن</p>
</div>

<script>
var SENTENCES = [
  "Breaking news. The press standing by to enter the East Room at the White House for President Trump to swear in America's new chairman of the Federal Reserve, Kevin Warsh.",
  "We know the focus has been on the economy right now and it hinges on lowering interest rates. Would this new Fed chair help Americans benefit from lower interest rates?",
  "President Trump is holding firm as he waits for Iran to respond to a potential peace deal. We know the major sticking points — Iran's uranium enriched to different degrees.",
  "They want to take it further, but Rubio says they can never have a nuclear weapon. And they can never control the Strait of Hormuz.",
  "The conflict is a major focus at a high stakes NATO summit. Secretary of State says there's been some slight progress. I'm Harris Faulkner.",
  "Iran reportedly is in talks with Oman on a plan to charge fees for ships passing through the strait. Trump admin warned against Iran controlling this waterway.",
  "Iran is trying to create a tolling system. They're trying to convince Oman to join in an international waterway. That's just not acceptable. It can't happen.",
  "If that were to happen in the Straits of Hormuz, it will happen in five other places around the world.",
  "Iran also is digging in its heels regarding its uranium. The regime has about 440 kg enriched to about 60%. That's enough to produce some nuclear bombs.",
  "Right now, we're negotiating. But either way, they're not going to have a nuclear weapon. There will be a nuclear war and that war will come here. We cannot let that happen.",
  "General Charles Wald, a former deputy commander of US European Command, will join me moments from now.",
  "An adviser for the president in the UAE says there's a 50/50 chance that the US and Iran agree on a future peace deal.",
  "His concern is that in the past Iran has overplayed or overestimated the cards they carry. He's hoping that's not the case this time.",
  "President Trump says he's allowing negotiations to continue as Iran is currently reviewing the latest proposal.",
  "Pakistan is intensifying its efforts to mediate. Iran is reportedly in talks with Oman over controlling the strait and charging tolls.",
  "Trump: 'We have total control of the Strait of Hormuz with our blockade. 100% effective. We want it open. We want it free. We don't want tolls.'",
  "I think the Iranians talk big. They talk tough, but they're in no position to do that. The US military with allies is in control of the Straits of Hormuz.",
  "I think it's time to be a little less patient and we need to go back and probably do a little more kinetic activity militarily.",
  "General Wald, we'll all be watching together this holiday weekend to see next steps, particularly with Iran. Good to have you, sir."
];

var times = new Array(SENTENCES.length).fill(null);
var player = document.getElementById('player');

// Build UI
var wrap = document.getElementById('pairsWrap');
SENTENCES.forEach(function(s, i){
  var div = document.createElement('div');
  div.className = 'pair-row';
  div.id = 'pair-'+i;
  div.innerHTML =
    '<div class="pair-num">'+(i+1)+'</div>'+
    '<div class="pair-text">'+s.substring(0,90)+'...</div>'+
    '<span class="pair-time" id="time-'+i+'">--:--</span>'+
    '<button class="set-btn" id="btn-'+i+'">ثبت زمان</button>';
  wrap.appendChild(div);
  document.getElementById('btn-'+i).addEventListener('click', function(){
    var t = player.currentTime;
    times[i] = Math.round(t * 10) / 10;
    document.getElementById('time-'+i).textContent = fmt(t);
    document.getElementById('time-'+i).className = 'pair-time set';
    document.getElementById('btn-'+i).textContent = '✓ ثبت شد';
    document.getElementById('btn-'+i).className = 'set-btn done';
    document.getElementById('pair-'+i).className = 'pair-row set';
    updateResult();
  });
});

function updateResult(){
  var filled = times.filter(function(t){return t!==null;});
  if(filled.length===0){document.getElementById('resultCode').textContent='هنوز زمانی ثبت نشده...';return;}
  var arr = times.map(function(t){return t===null?'?':t;});
  var code = 'var TIMES = ['+arr.join(',')+'];';
  document.getElementById('resultCode').textContent = code;
}

function fmt(t){if(isNaN(t)||t<0)t=0;var m=Math.floor(t/60),s=Math.floor(t%60),ms=Math.floor((t%1)*10);return m+':'+(s<10?'0':'')+s+'.'+ms;}

// Player controls
var pbPlay=document.getElementById('pbPlay');
var pbFill=document.getElementById('pbFill');
var pbCur=document.getElementById('pbCur');
var pbDur=document.getElementById('pbDur');
var pbBarWrap=document.getElementById('pbBarWrap');

function fmtSimple(t){if(isNaN(t)||t<0)t=0;var m=Math.floor(t/60),s=Math.floor(t%60);return m+':'+(s<10?'0':'')+s;}

pbPlay.addEventListener('click',function(){
  if(player.paused){player.play();pbPlay.textContent='⏸';}
  else{player.pause();pbPlay.textContent='▶';}
});
document.getElementById('pbBack').addEventListener('click',function(){player.currentTime=Math.max(0,player.currentTime-5);});
document.getElementById('pbFwd').addEventListener('click',function(){player.currentTime=Math.min(player.duration||720,player.currentTime+10);});
player.addEventListener('timeupdate',function(){
  var d=player.duration||720;
  pbFill.style.width=(player.currentTime/d*100)+'%';
  pbCur.textContent=fmtSimple(player.currentTime);
});
player.addEventListener('loadedmetadata',function(){pbDur.textContent=fmtSimple(player.duration);});
player.addEventListener('ended',function(){pbPlay.textContent='▶';});

pbBarWrap.addEventListener('click',function(ev){
  var rect=pbBarWrap.getBoundingClientRect();
  var ratio=(ev.clientX-rect.left)/rect.width;
  player.currentTime=(player.duration||720)*Math.max(0,Math.min(1,ratio));
});

// Copy button
document.getElementById('copyBtn').addEventListener('click',function(){
  var text=document.getElementById('resultCode').textContent;
  navigator.clipboard.writeText(text).then(function(){
    document.getElementById('copyBtn').textContent='✓ کپی شد!';
    setTimeout(function(){document.getElementById('copyBtn').textContent='کپی کردن';},2000);
  });
});

// Keyboard shortcut: Space = play/pause, numbers 1-9 = set time for that sentence
document.addEventListener('keydown',function(e){
  if(e.code==='Space'&&e.target.tagName!=='BUTTON'){
    e.preventDefault();
    if(player.paused){player.play();pbPlay.textContent='⏸';}
    else{player.pause();pbPlay.textContent='▶';}
  }
});
</script>
</body>
</html>
